databases:
  - name: autolot-crm-db
    plan: free

services:
  - type: web
    name: autolot-crm
    runtime: python
    plan: free
    disk:
      name: autolot-media
      mountPath: /var/data/media
      sizeGB: 1
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py ensure_demo_user && python manage.py seed_crm
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: autolot-crm-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: CRM_DEMO_PASSWORD
        sync: false
      - key: CRM_ADMIN_PASSWORD
        sync: false
      - key: CRM_FORCE_DEMO_PASSWORD
        value: "false"