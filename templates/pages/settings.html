{% extends "layout_app.html" %}

{% block title %}Налаштування — Autolot CRM{% endblock %}

{% block toolbar_action %}
<button type="button" class="wf-panel-btn wf-panel-btn--blue" data-action-message="Збережено">Зберегти</button>
{% endblock %}

{% block content %}
<div class="page-head">
  <h1 class="page-head__title">Налаштування</h1>
  <p class="page-head__sub">Формула, курси, пороги</p>
</div>

<div class="settings-grid">
  <div class="card settings-card">
    <h3 class="card__title settings-card__title">Формула ціни</h3>
    <div class="setting-field">
      <label for="setting-commission">Комісія (%)</label>
      <input id="setting-commission" type="number" value="8" step="0.1" inputmode="decimal">
    </div>
    <div class="setting-field">
      <label for="setting-logistics">Логістика (фіксована, CHF)</label>
      <input id="setting-logistics" type="number" value="2800" inputmode="decimal">
    </div>
  </div>
  <div class="card settings-card">
    <h3 class="card__title settings-card__title">Курси валют</h3>
    <div class="setting-field">
      <label for="setting-chf-uah">CHF → UAH</label>
      <input id="setting-chf-uah" type="number" value="47.20" step="0.01" inputmode="decimal">
    </div>
    <div class="setting-field">
      <label for="setting-eur-uah">EUR → UAH</label>
      <input id="setting-eur-uah" type="number" value="44.85" step="0.01" inputmode="decimal">
    </div>
  </div>
</div>
{% endblock %}
