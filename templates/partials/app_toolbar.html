<div class="app-toolbar">
  <button type="button" class="app-toolbar__menu" data-menu-toggle aria-label="Меню">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="app-toolbar__search wf-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" placeholder="Пошук: авто, VIN, клієнт…" autocomplete="off" data-global-search>
  </div>
  <div class="app-toolbar__meta">
    <span class="app-toolbar__date">2026-06-13</span>
    <button type="button" class="wf-sketch" data-sketch-toggle aria-pressed="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      Ескіз
    </button>
    <div class="wf-currency" role="group" aria-label="Валюта" data-package-feature="currency_switch">
      <button type="button" class="wf-currency__btn wf-currency__btn--active" data-currency="CHF">CHF</button>
      <button type="button" class="wf-currency__btn" data-currency="EUR">EUR</button>
      <button type="button" class="wf-currency__btn" data-currency="USD">USD</button>
    </div>
    {% block toolbar_action %}
    <button type="button" class="wf-panel-btn wf-panel-btn--dark" data-open-modal="deal">+ Угода</button>
    {% endblock %}
  </div>
</div>
{% include "partials/package_bar.html" %}
