<div class="crm-modal" id="crm-modal" hidden aria-hidden="true">
  <div class="crm-modal__backdrop" data-modal-close tabindex="-1"></div>
  <div
    class="crm-modal__dialog card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="crm-modal-title"
  >
    <div class="crm-modal__header">
      <h2 class="crm-modal__title" id="crm-modal-title"></h2>
      <button type="button" class="crm-modal__close" data-modal-close aria-label="Закрити">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form class="crm-modal__form" id="crm-modal-form" novalidate></form>
  </div>
</div>
