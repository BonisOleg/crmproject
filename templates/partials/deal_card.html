{% load l10n %}
<a
  href="{% url 'deal_detail' deal.id %}"
  class="card deal-card hover-lift animate-fade-up crm-card--deletable {{ stagger_class|default:'' }}"
  data-reveal
  data-deal-id="{{ deal.id }}"
  data-crm-card="deals"
  data-crm-key="{{ deal.id }}"
  data-deal-item
  data-deal-status="{{ deal.execution }}"
  data-deal-debt="{{ deal.debt|unlocalize }}"
  data-deal-search="{{ deal.id|lower }} {{ deal.car|lower }} {{ deal.client|lower }} {{ deal.year }} {{ deal.vin|lower }}"
>
  <div class="deal-card__image-wrap">
    <img src="{{ deal.image }}" alt="{{ deal.car }}" class="deal-card__image" loading="lazy" referrerpolicy="no-referrer">
    <div class="deal-card__badges">
      <span class="pill pill--{{ deal.execution }}"><span class="pill__dot"></span>{{ deal.execution_label }}</span>
      <span class="pill pill--{{ deal.payment }}"><span class="pill__dot"></span>{{ deal.payment_label }}</span>
    </div>
  </div>
  <div class="deal-card__body">
    <div class="deal-card__id">{{ deal.id }}</div>
    <div class="deal-card__title">{{ deal.car }}</div>
    <div class="deal-card__meta">{{ deal.year }} · {{ deal.client }}</div>
    <div class="deal-card__footer">
      <span class="deal-card__price mono" data-money="{{ deal.price|unlocalize }}" data-money-currency="{{ deal.currency }}">{{ deal.price|floatformat:0 }} {{ deal.currency }}</span>
      {% if deal.debt > 0 %}
      <span class="text-red mono" style="font-size:13px" data-money="{{ deal.debt|unlocalize }}" data-money-currency="{{ deal.currency }}" data-money-sign="−">−{{ deal.debt|floatformat:0 }}</span>
      {% else %}
      <span class="text-green" style="font-size:13px">✓</span>
      {% endif %}
    </div>
  </div>
</a>
